<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江苏校园网DNS调度合理性自检</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px 32px;
            width: 100%;
            max-width: 640px;
            margin-top: auto;
            margin-bottom: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .logo {
            position: absolute;
            top: 24px;
            right: 24px;
            max-width: 140px;
            height: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
            text-align: center;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status.visible {
            display: block;
            opacity: 1;
        }

        .status .log {
            margin-bottom: 0;
            color: #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            animation: fadeInLog 0.3s ease forwards;
        }

        @keyframes fadeInLog {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-mark {
            color: #10b981;
            font-weight: bold;
        }

        /* 动画元素 */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }
        .blob-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: #4F46E5; border-radius: 50%; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: #ec4899; border-radius: 50%; }

        /* Toast 样式 */
        #toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #f8fafc;
            padding: 20px 24px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translate(0, 20px) scale(0.95);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translate(0, 0) scale(1);
            opacity: 1;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* 结果卡片高亮动画 */
        @keyframes successHighlight {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); border-color: rgba(16, 185, 129, 0.6); }
            50% { box-shadow: 0 0 20px 5px rgba(16, 185, 129, 0.2); border-color: #10b981; }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); border-color: var(--glass-border); }
        }

        .highlight-success {
            animation: successHighlight 1.5s ease-out;
        }

    </style>
</head>
<body>
    <img src="logo.png" alt="Logo" class="logo">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div id="toast-container"></div>

    <div class="container">
        <h1>江苏校园网DNS调度合理性自检</h1>
        


        <div class="status" id="statusBox">
            <div id="logs"></div>
        </div>

        <div class="result-card" id="resultCard" style="display: none; margin-top: 16px; background: rgba(15, 23, 42, 0.6); padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);">
            <h3 style="margin-bottom: 8px; font-size: 15px; color: #10b981; text-align: center;">分析结果 ✓</h3>
            
            <div id="detectedSchoolPrompt" style="font-size: 12px; color: #10b981; margin-bottom: 8px; text-align: center; display: none;"></div>

            <div id="resList" style="font-size: 13px; color: #cbd5e1; line-height: 2;">
                <!-- 移动到这里的醒目提示 -->
                <div style="background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #fcd34d; padding: 6px; border-radius: 6px; font-size: 12px; margin: 4px 0 12px 0; text-align: center; line-height: 1.4;">
                    💡 <strong>请核对学校和真实DNS</strong>。若不准请在黄色框内修改并「重新上报」。
                </div>

                <div><strong>分析凭证:</strong> <span id="resUuid" style="color: #fbbf24; font-family: monospace;"></span></div>

                <div style="display: flex; align-items: center; gap: 8px; margin: 6px 0;">
                    <strong>学校名称:</strong> 
                    <div style="position: relative; flex: 1; max-width: 200px;">
                        <input type="text" id="schoolName" style="background: rgba(15, 23, 42, 0.4); border: 1px solid #fbbf24; color: #fff; padding: 4px 24px 4px 8px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box;" placeholder="例如：南京大学">
                        <span style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #fbbf24; font-size: 11px;">✏️</span>
                    </div>
                </div>

                <div><strong>公网 IPv4:</strong> <span id="resClientIp" style="color: #60a5fa;"></span></div>
                <div><strong>公网 IPv6:</strong> <span id="resV6Ip" style="color: #60a5fa;"></span></div>
                <div><strong>递归 DNS:</strong> <span id="resRecursiveIp" style="color: #60a5fa;"></span></div>
                
                <div id="resMappedDnsRow" style="display: none;"><strong>推测配置DNS:</strong> <span id="resMappedDns" style="color: #60a5fa;"></span></div>
                
                <div style="display: flex; align-items: center; gap: 8px; margin: 6px 0;">
                    <strong>真实配置DNS:</strong> 
                    <div style="position: relative; flex: 1; max-width: 200px;">
                        <input type="text" id="realDnsInput" style="background: rgba(15, 23, 42, 0.4); border: 1px solid #fbbf24; color: #fff; padding: 4px 24px 4px 8px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box;" placeholder="若推测不准请在此修正">
                        <span style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #fbbf24; font-size: 11px;">✏️</span>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button id="submitBtn" style="flex: 1; font-size: 13px; padding: 8px; background: var(--primary); height: auto; width: auto;">
                    <span>重新上报</span>
                    <div class="loader" id="btnLoader" style="width: 14px; height: 14px; border-width: 2px;"></div>
                </button>
                <button id="exportCsvBtn" style="flex: 1; font-size: 13px; padding: 8px; background: #10b981; display: none; height: auto; width: auto;">导出报告 (CSV)</button>
            </div>
        </div>

        <div class="agent-download-card" style="margin-top: 16px; padding: 12px; background: rgba(30, 41, 59, 0.4); border-radius: 8px; border: 1px dashed rgba(79, 70, 229, 0.5); text-align: center;">
            <div style="font-size: 13px; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                深度自检 Agent 下载 (无需安装，运行后自动上报)
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                <a href="/downloads/agent.bat" style="background: rgba(16, 185, 129, 0.15); color: #34d399; padding: 4px 10px; border-radius: 6px; text-decoration: none; font-size: 12px; border: 1px solid rgba(16, 185, 129, 0.3); transition: all 0.2s;">Win (BAT脚本)</a>
                <a href="/downloads/agent_windows_x86_64.exe" style="background: rgba(79, 70, 229, 0.15); color: #a5b4fc; padding: 4px 10px; border-radius: 6px; text-decoration: none; font-size: 12px; border: 1px solid rgba(79, 70, 229, 0.3); transition: all 0.2s;">Win (x86_64)</a>
                <a href="/downloads/agent_mac_arm64" style="background: rgba(79, 70, 229, 0.15); color: #a5b4fc; padding: 4px 10px; border-radius: 6px; text-decoration: none; font-size: 12px; border: 1px solid rgba(79, 70, 229, 0.3); transition: all 0.2s;">Mac (M芯片)</a>
                <a href="/downloads/agent_mac_amd64" style="background: rgba(79, 70, 229, 0.15); color: #a5b4fc; padding: 4px 10px; border-radius: 6px; text-decoration: none; font-size: 12px; border: 1px solid rgba(79, 70, 229, 0.3); transition: all 0.2s;">Mac (Intel)</a>
                <a href="/downloads/agent_linux_x86_64" style="background: rgba(79, 70, 229, 0.15); color: #a5b4fc; padding: 4px 10px; border-radius: 6px; text-decoration: none; font-size: 12px; border: 1px solid rgba(79, 70, 229, 0.3); transition: all 0.2s;">Linux</a>
            </div>
            <style>
                .agent-download-card a:hover {
                    background: rgba(79, 70, 229, 0.3) !important;
                    color: #fff !important;
                }
            </style>
        </div>
    </div>

    <script>
        // 【配置区】请根据您的实际环境修改以下域名
        const AUTH_DOMAIN = "dns.dnscheck.cloud"; // 用于递归DNS分析的自有域名
        // 自动拼接当前的端口访问后端的 IPv6 地址
        const V6_API_URL = "http://[2402:4e00:c021:1b00:4410:3d52:8cdc:0]" + (window.location.port ? ":" + window.location.port : "") + "/api/ip"; 

        const submitBtn = document.getElementById('submitBtn');
        const schoolInput = document.getElementById('schoolName');
        const btnLoader = document.getElementById('btnLoader');
        const btnText = submitBtn.querySelector('span');
        const statusBox = document.getElementById('statusBox');
        const logsContainer = document.getElementById('logs');

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="toast-icon">✓</div>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            // 触发动画
            setTimeout(() => toast.classList.add('show'), 10);
            
            // 3秒后移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function addLog(message) {
            logsContainer.innerHTML = `<div class="log">${message}</div>`;
            statusBox.classList.add('visible');
        }

        async function fetchIp() {
            try {
                const res = await fetch('/api/ip');
                const data = await res.json();
                return data.ip || '';
            } catch (e) {
                return '';
            }
        }

        async function fetchV6Ip() {
            try {
                let url = V6_API_URL;
                const res = await fetch(url);
                const data = await res.json();
                return data.ip || '未检测到IPV6地址';
            } catch (e) {
                return '未检测到IPV6地址';
            }
        }

        async function detectSchool() {
            try {
                const res = await fetch('/api/detect_school');
                const data = await res.json();
                if (data.school) {
                    schoolInput.value = data.school;
                    const promptDiv = document.getElementById('detectedSchoolPrompt');
                    if (promptDiv) {
                        promptDiv.textContent = '已自动检测到您所在的学校：' + data.school;
                        promptDiv.style.display = 'block';
                    }
                }
            } catch (e) {
                console.error('Failed to detect school:', e);
            }
        }

        async function startAnalysis(isRetry = false) {
            let schoolName = schoolInput.value.trim();
            if (!schoolName && isRetry) {
                alert('请输入学校名称！');
                schoolInput.focus();
                return;
            }
            if (!schoolName) {
                schoolName = "未识别学校";
            }

            // UI 状态更新
            submitBtn.disabled = true;
            btnText.textContent = isRetry ? '更新中...' : '分析中...';
            btnLoader.style.display = 'block';
            logsContainer.innerHTML = '';
            statusBox.classList.add('visible');
            addLog('初始化探测任务...');

            // 生成唯一ID并触发递归DNS探测
            if (!window.currentUuid) {
                window.currentUuid = Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
            }
            const uuid = window.currentUuid;
            
            // 仅在首次分析时发送探针
            if (!isRetry) {
                const dummyImg = new Image();
                dummyImg.src = `http://${uuid}.${AUTH_DOMAIN}/trigger.png`;
                addLog('已发送递归 DNS 探针...');
            }

            let results = {
                schoolName: schoolName,
                uuid: uuid,
                clientIp: '',
                v6Ip: '',
                realDns: document.getElementById('realDnsInput').value.trim()
            };

            // 重试时复用 IP 结果，避免重复等待
            if (isRetry && window.currentResults) {
                results.clientIp = window.currentResults.clientIp;
                results.v6Ip = window.currentResults.v6Ip;
                addLog('复用之前的网络探测结果...');
            } else {
                try {
                    const [clientIp, v6Ip] = await Promise.all([
                        fetchIp().then(res => { addLog('公网 IPv4 获取完成'); return res; }),
                        fetchV6Ip().then(res => { addLog('IPv6 连通性测试完成'); return res; })
                    ]);

                    results.clientIp = clientIp;
                    results.v6Ip = v6Ip;

                } catch (e) {
                    addLog('部分测试项网络请求异常');
                }
            }

            window.currentResults = results;

            addLog('正在上传分析报告...');

            try {
                const submitRes = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(results)
                });
                if (submitRes.ok) {
                    const respData = await submitRes.json();
                    
                    if (respData.status === "redirect" && respData.redirect) {
                        window.location.href = respData.redirect;
                        return;
                    }

                    addLog('<span class="success-mark">✓ 报告已成功提交并归档</span>');
                    
                    if (isRetry) {
                        showToast('感谢您的纠错反馈，已收到您提交的信息，我们会尽快核查并更新数据，帮更多同学获得准确的识别结果。');
                        const card = document.getElementById('resultCard');
                        card.classList.remove('highlight-success');
                        void card.offsetWidth; // 触发重绘以重新运行动画
                        card.classList.add('highlight-success');
                    }
                    
                    let client = respData.client || {};
                    let recursive = respData.recursive || {};
                    let v6 = respData.v6 || {};

                    let traceId = results.uuid;
                    if (traceId && traceId.length > 8) { traceId = traceId.substring(0, 8); }
                    document.getElementById('resUuid').textContent = traceId || 'N/A';
                    document.getElementById('schoolName').value = results.schoolName;
                    document.getElementById('resClientIp').textContent = client.display || results.clientIp || '未检测到';
                    document.getElementById('resV6Ip').textContent = v6.display || results.v6Ip;
                    document.getElementById('resRecursiveIp').textContent = recursive.display || '未能获取';

                    const mappedDnsRow = document.getElementById('resMappedDnsRow');
                    let predictedDnsStr = '';
                    if (recursive.mappedIP) {
                        predictedDnsStr = `${recursive.mappedIP} (${recursive.mappedName})`;
                        document.getElementById('resMappedDns').textContent = predictedDnsStr;
                        mappedDnsRow.style.display = 'block';
                    } else {
                        mappedDnsRow.style.display = 'none';
                        predictedDnsStr = recursive.ip || '';
                    }

                    const realDnsInput = document.getElementById('realDnsInput');
                    if (!realDnsInput.value && predictedDnsStr) {
                        realDnsInput.placeholder = predictedDnsStr;
                    }

                    document.getElementById('resultCard').style.display = 'block';

                    if (client.ip && recursive.ip) {
                        let isMatch = false;
                        if (client.ispBase && recursive.ispBase && client.ispBase === recursive.ispBase) {
                            isMatch = true;
                        }

                        let reportHtml = `
                            <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px; line-height: 1.5; color: #e2e8f0;">
                                <p style="margin-bottom: 4px;">您当前的DNS出口IP为：<strong>${recursive.ip}</strong> （归属运营商：${recursive.ispFull}），推断您配置的DNS服务器可能为：<strong>${predictedDnsStr}</strong>。</p>
                                <p style="margin-bottom: 8px;">您当前的上网NAT映射IP为：<strong>${client.ip}</strong> （归属运营商：${client.ispFull}）。</p>
                                <div style="padding: 8px 12px; border-radius: 8px; ${isMatch ? 'background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.3);' : 'background: rgba(245, 158, 11, 0.2); border: 1px solid rgba(245, 158, 11, 0.3);'}">
                                    ${isMatch ? 
                                        `<p style="color: #34d399; margin: 0;"><strong>✅ 恭喜！</strong>您的 DNS 调度节点与当前运营商线路匹配，调度策略合理，上网访问体验最优</p>` 
                                        : 
                                        `<p style="color: #fbbf24; margin: 0 0 6px 0;"><strong>⚠️ 检测结果：</strong>您的DNS调度节点与当前运营商线路不匹配，存在跨网访问隐患，易造成网络卡顿、时延偏高及部分业务访问异常。</p>
                                         <p style="margin: 0; color: #e2e8f0;"><strong>建议：</strong>请检查终端DNS配置，取消手动自定义 DNS，优先使用校园网 DHCP 自动下发的 LDNS 地址；若调整后仍调度不匹配，可拨打南京移动宽带热线电话 025-69810088 协助排查。</p>`
                                    }
                                </div>
                            </div>
                        `;
                        let reportDiv = document.getElementById('reportDiv');
                        if (!reportDiv) {
                            reportDiv = document.createElement('div');
                            reportDiv.id = 'reportDiv';
                            document.getElementById('resultCard').insertBefore(reportDiv, document.getElementById('resList'));
                        }
                        reportDiv.innerHTML = reportHtml;

                        window.currentExportData = {
                            school: results.schoolName,
                            uuid: traceId || 'N/A',
                            clientIp: client.display || results.clientIp || '未检测到',
                            v6Ip: v6.display || results.v6Ip,
                            recursiveIp: recursive.display || '未能获取',
                            mappedDns: realDnsInput.value.trim() || predictedDnsStr,
                            isMatch: isMatch ? '匹配正常' : '匹配异常'
                        };
                        document.getElementById('exportCsvBtn').style.display = 'block';
                    }
                } else {
                    addLog('提交失败，服务端返回异常');
                }
            } catch (e) {
                addLog('提交失败，网络无法连接服务端');
            }

            submitBtn.disabled = false;
            btnText.textContent = '修改并重新上报';
            btnLoader.style.display = 'none';
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await detectSchool();
            startAnalysis();
        });

        submitBtn.addEventListener('click', () => {
            startAnalysis(true);
        });

        document.getElementById('exportCsvBtn').addEventListener('click', () => {
            if (!window.currentExportData) return;
            const data = window.currentExportData;
            const csvRows = [
                ['分析凭证', '学校名称', '公网 IPv4', '公网 IPv6', '递归 DNS', '当前配置DNS', '诊断结果'],
                [data.uuid, data.school, data.clientIp, data.v6Ip, data.recursiveIp, data.mappedDns, data.isMatch]
            ];
            
            let csvContent = '\uFEFF' + csvRows.map(e => e.join(',')).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            const timeStr = new Date().toLocaleString('zh-CN', { hour12: false }).replace(/[\/\s:]/g, '');
            a.download = `${data.school}_${data.uuid}_${timeStr}.csv`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
